<!DOCTYPE html>
<html>
    <head>
        <title>String Length</title>
        <script src="stringLength.js"></script>
    </head>
    <body>
        <h1>String Length</h1>
        <label for="txtString">Enter a String</label>
        <input type="text" id="txtString" placeholder="Enter a String">
        <button onclick="onClickToCheckLength()">Check Length</button>
        <p id="pResult"></p>

        <h1>String Length Limit</h1>
        <textarea onkeyup="onClickStringLength()" rows="8" cols="80" placeholder="Enter here" id="txtContent"></textarea>
        <p id="PResults"></p>
    </body>
</html>
